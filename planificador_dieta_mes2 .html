<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador Dieta Mes 2 — Hilario Cambero</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f7f4; --surface: #ffffff; --surface2: #f2f0eb;

  --radius: 10px; --radius-lg: 14px;
}
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.5; }
header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-title { font-size: 17px; font-weight: 600; }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.badge-nutri { font-size: 11px; background: var(--green-light); color: var(--green-dark); border-radius: 20px; padding: 4px 12px; }
.back-btn { font-size: 12px; color: var(--blue); text-decoration: none; border: 0.5px solid var(--blue-mid); border-radius: 20px; padding: 5px 12px; background: var(--blue-light); }
.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
.tabs { display: flex; gap: 6px; margin-bottom: 1.75rem; flex-wrap: wrap; }
.tab { padding: 9px 18px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-size: 14px; background: var(--surface); color: var(--text2); transition: all 0.15s; }
.tab.active { background: var(--green); color: white; border-color: var(--green); font-weight: 500; }
.tab:hover:not(.active) { background: var(--surface2); }
.view { display: none; } .view.active { display: block; }
.day-grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 8px; margin-bottom: 1rem; }
.day-card { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 8px; cursor: pointer; transition: all 0.15s; background: var(--surface); }
.day-card:hover { border-color: var(--green); }
.day-card.selected { border-color: var(--green); background: var(--green-light); }
.day-name { font-size: 11px; font-weight: 600; margin-bottom: 6px; color: var(--text2); letter-spacing: 0.05em; }
.day-card.selected .day-name { color: var(--green-dark); }
.meal-mini { font-size: 10px; color: var(--text3); line-height: 1.4; }
.meal-mini span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-mini .mini-label { font-size: 9px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.day-detail { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 1rem; }
.day-title { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; color: var(--green-dark); }
.meal-block { margin-bottom: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.meal-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; cursor: pointer; background: var(--surface2); user-select: none; transition: background 0.1s; }
.meal-header:hover { background: #eae8e2; }
.meal-label { font-size: 13px; font-weight: 600; }
.meal-time { font-size: 11px; color: var(--text3); margin-top: 1px; }
.meal-body { display: none; padding: 14px; border-top: 0.5px solid var(--border); }
.meal-body.open { display: block; }
.plato { margin-bottom: 14px; } .plato:last-child { margin-bottom: 0; }
.plato-name { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.ingred-list { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 6px; }
.ingred-list::before { content: "🧂 "; }
.elab { font-size: 12px; color: var(--text2); border-left: 2px solid var(--green-mid); padding-left: 10px; line-height: 1.7; margin-bottom: 8px; font-style: italic; }

.video-link { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: var(--blue); text-decoration: none; border: 0.5px solid var(--blue-mid); border-radius: 20px; padding: 4px 10px; background: var(--blue-light); transition: background 0.15s; }
.video-link:hover { background: var(--blue-mid); }
.chevron { font-size: 14px; color: var(--text3); transition: transform 0.2s; line-height: 1; }
.chevron.open { transform: rotate(180deg); }
.ingred-day-section { background: var(--green-light); border: 0.5px solid var(--green-mid); border-radius: var(--radius); padding: 14px; margin-top: 14px; }

.day-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.day-btn { padding: 8px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-size: 13px; background: var(--surface); color: var(--text2); transition: all 0.15s; }
.day-btn.active { background: var(--green); color: white; border-color: var(--green); font-weight: 500; }
.day-btn:hover:not(.active) { background: var(--surface2); }
.compra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.compra-cat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
.cat-title { font-size: 11px; font-weight: 700; margin-bottom: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.compra-item { display: flex; align-items: center; gap: 9px; font-size: 13px; padding: 5px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
.compra-item:last-child { border-bottom: none; }
.compra-item.done { text-decoration: line-through; color: var(--text3); }
.check { width: 16px; height: 16px; border: 0.5px solid var(--border2); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.15s; }
.check.checked { background: var(--green); border-color: var(--green); color: white; }
.progress-bar-wrap { background: var(--surface2); border-radius: 20px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar { background: var(--green); height: 6px; border-radius: 20px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; }
</style>
</head>

<header>

    <div class="header-title">Planificador de Dieta — Mes 2</div>

    <div class="compra-grid" id="compraGrid"></div>
  </div>
</div>

const COMPRA = {
  'Frutas y verduras': ['Tomate', 'Tomate cherry', 'Calabacín', 'Pimiento rojo', 'Pimiento verde', 'Cebolla', 'Brócoli', 'Champiñones', 'Rúcula', 'Brotes espinacas y canónigos', 'Remolacha', 'Zanahoria', 'Patatas', 'Aguacate', 'Manzana', 'Fresas', 'Frutos rojos', 'Kiwi', 'Mango'],
  'Carnes y embutidos': ['Pechuga de pollo', 'Solomillo de cerdo', 'Hamburguesa', 'Jamón ibérico'],
  'Pescados': ['Salmón fresco', 'Dorada', 'Caballa', 'Atún en aceite (lata)'],
  'Lácteos y quesos': ['Leche desnatada', 'Yogur desnatado', 'Queso Philadelphia light', 'Queso rulo de cabra', 'Queso mozzarella', 'Queso fresco', 'Queso feta', 'Queso roquefort', 'Queso manchego semicurado'],
  'Panadería y cereales': ['Pan integral (rebanadas)', 'Pan de hamburguesa', 'Pasta', 'Base de pizza'],
  'Legumbres': ['Lentejas'],
  'Huevos': ['Huevos (docena)'],
  'Bebidas': ['Cerveza rubia', 'Café natural'],
  'Frutos secos': ['Nueces'],
  'Aceites y condimentos': ['Aceite de oliva', 'Vinagre', 'Vinagre de módena', 'Mahonesa', 'Mostaza', 'Miel', 'Salsa de soja', 'Canela', 'Pepinillos a la vinagreta', 'Ajo']
};

const firebaseConfig = {
  apiKey: "AIzaSyA7Q7jniveEqu6_HkJoSvry8JP8Wg49Z84",
  authDomain: "dieta-hilario-2ecbd.firebaseapp.com",
  databaseURL: "https://dieta-hilario-2ecbd-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "dieta-hilario-2ecbd",
  storageBucket: "dieta-hilario-2ecbd.firebasestorage.app",
  messagingSenderId: "145044988123",
  appId: "1:145044988123:web:705ee47c673ceffe9becfe"
};

const fbApp = firebase.initializeApp(firebaseConfig, 'mes2');
const db = fbApp.database();
const compraRef = db.ref('compra_mes2/items');

const checkedItems = new Set();

function saveChecked() {
  const obj = {};
  getAllItems().forEach(item => { obj[item.replace(/[.#$/\[\]]/g, '_')] = checkedItems.has(item); });
  compraRef.set(obj).catch(e => console.error('Firebase write error:', e));
}

function getAllItems() { return Object.values(COMPRA).flat(); }

function updateProgress() {
  const all = getAllItems();
  const pct = all.length ? Math.round((checkedItems.size / all.length) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = checkedItems.size + ' de ' + all.length + ' artículos marcados';
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.tab').forEach(el => { if (el.textContent.toLowerCase().includes(v === 'semanal' ? 'semanal' : v === 'diaria' ? 'diaria' : 'compra')) el.classList.add('active'); });
}

function getDailyIngredients(day) {
  const all = [];
  Object.values(MEALS[day]).forEach(items => items.forEach(item => item.ingredientes.split(',').forEach(s => all.push(s.trim()))));
  return [...new Set(all)];
}

function buildMealBlock(mealKey, items, idPrefix) {
  const id = idPrefix + '_' + mealKey;
  const platosHtml = items.map(p => {
    const videoBtn = p.video ? `<a class="video-link" href="${p.video}" target="_blank">▶ Ver receta en YouTube</a>` : '';
    const elab = p.elaboracion ? `<div class="elab"><div class="elab-label">Elaboración</div>${p.elaboracion}</div>` : '';
    return `<div class="plato"><div class="plato-name">${p.nombre}</div><div class="ingred-list">${p.ingredientes}</div>${elab}${videoBtn}</div>`;
  }).join('<hr style="border:none;border-top:0.5px solid var(--border);margin:10px 0;">');
  return `<div class="meal-block">
    <div class="meal-header" onclick="toggleMeal('${id}')">
      <div><div class="meal-label">${MEAL_LABELS[mealKey]}</div><div class="meal-time">${MEAL_TIMES[mealKey]} · ${items.length} plato${items.length>1?'s':''}</div></div>
      <div class="chevron" id="ch_${id}">▾</div>
    </div>
    <div class="meal-body" id="mb_${id}">${platosHtml}</div>
  </div>`;
}

function toggleMeal(id) {
  document.getElementById('mb_'+id).classList.toggle('open');
  document.getElementById('ch_'+id).classList.toggle('open');
}

function buildDayHTML(day, prefix) {
  const mealBlocks = Object.entries(MEALS[day]).map(([k,items]) => buildMealBlock(k,items,prefix)).join('');
  const tags = getDailyIngredients(day).map(i => `<span class="ingred-tag">${i}</span>`).join('');
  return `<div class="day-detail"><div class="day-title">${day}</div>${mealBlocks}<div class="ingred-day-section"><div class="ingred-day-title">Ingredientes necesarios hoy</div><div>${tags}</div></div></div>`;
}

function buildWeekGrid() {
  document.getElementById('weekGrid').innerHTML = DAYS.map(day => {
    const almuerzo = MEALS[day].almuerzo[0].nombre;
    const cena = MEALS[day].cena[0].nombre;
    return `<div class="day-card" id="wdc_${day}" onclick="selectWeekDay('${day}')">
      <div class="day-name">${day.substring(0,3).toUpperCase()}</div>
      <div class="meal-mini"><span class="mini-label">Almuerzo</span><span>${almuerzo}</span><span class="mini-label">Cena</span><span>${cena}</span></div>
    </div>`;
  }).join('');
}

function selectWeekDay(day) {
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('wdc_'+day).classList.add('selected');
  document.getElementById('weekDayDetail').innerHTML = buildDayHTML(day,'w');
}

function buildDayButtons() {
  document.getElementById('dayButtons').innerHTML = DAYS.map(day =>
    `<div class="day-btn" id="dbt_${day}" onclick="selectDay('${day}')">${day}</div>`).join('');
}

function selectDay(day) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('dbt_'+day).classList.add('active');
  document.getElementById('dayDetail').innerHTML = buildDayHTML(day,'d');
}

function rebuildCompraUI() {
  document.getElementById('compraGrid').innerHTML = Object.entries(COMPRA).map(([cat,items]) =>
    `<div class="compra-cat"><div class="cat-title">${cat}</div>` +
    items.map(item => {
      const key = item.replace(/[\s()\/]/g,'_');
      const done = checkedItems.has(item);
      return `<div class="compra-item${done?' done':''}" id="ci_${key}" onclick="toggleItem('${item}','${key}')"><div class="check${done?' checked':''}" id="ck_${key}">${done?'✓':''}</div><span>${item}</span></div>`;
    }).join('') + '</div>').join('');
  updateProgress();
}

function toggleItem(item, key) {
  const ci = document.getElementById('ci_'+key);
  const ck = document.getElementById('ck_'+key);
  if (checkedItems.has(item)) { checkedItems.delete(item); ci.classList.remove('done'); ck.classList.remove('checked'); ck.textContent=''; }
  else { checkedItems.add(item); ci.classList.add('done'); ck.classList.add('checked'); ck.textContent='✓'; }
  saveChecked(); updateProgress();
}

function resetCompra() {
  checkedItems.clear(); saveChecked();
  document.querySelectorAll('.compra-item').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.check').forEach(el => { el.classList.remove('checked'); el.textContent=''; });
  updateProgress();
}

function printCompra() {
  const now = new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let rows = '';
  Object.entries(COMPRA).forEach(([cat,items]) => {
    rows += '<div class="cat"><div class="cat-title">'+cat+'</div>';
    items.forEach(item => {
      const done = checkedItems.has(item);
      rows += '<div class="item'+(done?' done':'')+'"><div class="box'+(done?' checked':'')+'">'+( done?'&#10003;':'')+'</div><span>'+item+'</span></div>';
    });
    rows += '</div>';
  });
  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Lista de la compra — Mes 2</title>
<style>body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:2rem;font-size:13px;}h1{font-size:20px;font-weight:600;margin-bottom:4px;}.sub{font-size:12px;color:#666;margin-bottom:1.5rem;border-bottom:1px solid #ccc;padding-bottom:.75rem;}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}.cat{break-inside:avoid;margin-bottom:8px;}.cat-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;border-bottom:.5px solid #ccc;padding-bottom:3px;margin-bottom:5px;}.item{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:.5px solid #eee;}.item:last-child{border-bottom:none;}.item.done{text-decoration:line-through;color:#aaa;}.box{width:12px;height:12px;border:1px solid #999;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}.box.checked{background:#1D9E75;border-color:#1D9E75;color:white;}.footer{margin-top:1.5rem;text-align:center;font-size:10px;color:#999;border-top:.5px solid #eee;padding-top:.5rem;}</style></head><body>
<h1>Lista de la compra — Mes 2</h1><div class="sub">Hilario Cambero &mdash; Nutricionista: Mar&#237;a Rosco Rodr&#237;guez</div>
<div class="grid">${rows}</div><div class="footer">Impreso el ${now}</div></body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}

// Firebase real-time listener
compraRef.on('value', (snapshot) => {
  const data = snapshot.val();
  checkedItems.clear();
  if (data) {
    getAllItems().forEach(item => {
      const key = item.replace(/[.#$/\[\]]/g, '_');
      if (data[key] === true) checkedItems.add(item);
    });
  }
  rebuildCompraUI();
  updateProgress();
});

buildWeekGrid(); buildDayButtons(); selectDay('Lunes');
</script>
</body>
