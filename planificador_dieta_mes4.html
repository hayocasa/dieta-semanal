*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }

.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
.tabs { display: flex; gap: 6px; margin-bottom: 1.75rem; flex-wrap: wrap; }
.tab { padding: 9px 18px; border: 0.5px solid var(--border2); border-radius: var(--radius); cursor: pointer; font-size: 14px; background: var(--surface); color: var(--text2); transition: all 0.15s; }

.view { display: none; } .view.active { display: block; }
.day-grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 8px; margin-bottom: 1rem; }
.day-card { border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 8px; cursor: pointer; transition: all 0.15s; background: var(--surface); }

.day-card.selected { border-color: var(--accent); background: var(--accent-light); }

.day-detail { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-top: 1rem; }
.day-title { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; color: var(--accent-dark); }

const COMPRA = {
  'Frutas y verduras': ['Tomate', 'Tomate cherry', 'Tomate frito', 'Pimiento rojo', 'Pimiento verde', 'Cebolla', 'Calabacín', 'Berenjena', 'Champiñones', 'Espárragos verdes', 'Espárragos blancos', 'Alcachofas corazones', 'Rúcula', 'Brotes espinacas y canónigos', 'Zanahoria', 'Remolacha', 'Patata hervida', 'Patata asada', 'Aguacate', 'Manzana', 'Melocotón', 'Piña natural'],
  'Carnes y embutidos': ['Pollo-muslo', 'Hamburguesa', 'Jamón ibérico', 'Jamón de York (cocido)', 'Lacón'],
  'Pescados y mariscos': ['Salmón fresco', 'Salmón ahumado', 'Dorada', 'Pulpo', 'Langostino', 'Atún en aceite (lata)', 'Sardinas en aceite (lata)'],
  'Lácteos y quesos': ['Leche desnatada', 'Yogur desnatado', 'Queso Philadelphia light', 'Queso rulo de cabra', 'Queso mozzarella', 'Queso fresco', 'Queso gorgonzola'],
  'Panadería y cereales': ['Pan integral (rebanadas)', 'Pan de hamburguesa', 'Pasta', 'Maíz cocido'],
  'Legumbres': ['Lentejas'],
  'Huevos': ['Huevos (docena)'],
  'Bebidas': ['Cerveza rubia', 'Vino blanco', 'Café natural'],
  'Frutos secos': ['Nueces', 'Aceitunas verdes'],
  'Aceites y condimentos': ['Aceite de oliva', 'Vinagre', 'Vinagre de módena', 'Mahonesa', 'Mostaza', 'Miel', 'Canela', 'Pimentón dulce', 'Pepinillos a la vinagreta', 'Ajo', 'Zumo de limón']
};

function saveChecked() {
  const obj = {};
  getAllItems().forEach(item => { obj[item.replace(/[.#$\/\[\]]/g, '_')] = checkedItems.has(item); });
  compraRef.set(obj).catch(e => console.error('Firebase write error:', e));
}

function getAllItems() { return Object.values(COMPRA).flat(); }

function updateProgress() {
  const all = getAllItems();
  const pct = all.length ? Math.round((checkedItems.size / all.length) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = checkedItems.size + ' de ' + all.length + ' artículos marcados';
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.tab').forEach(el => { if (el.textContent.toLowerCase().includes(v === 'semanal' ? 'semanal' : v === 'diaria' ? 'diaria' : 'compra')) el.classList.add('active'); });
}

function getDailyIngredients(day) {
  const all = [];
  Object.values(MEALS[day]).forEach(items => items.forEach(item => item.ingredientes.split(',').forEach(s => all.push(s.trim()))));
  return [...new Set(all)];
}

function buildMealBlock(mealKey, items, idPrefix) {
  const id = idPrefix + '_' + mealKey;
  const platosHtml = items.map(p => {
    const videoBtn = p.video ? `<a class="video-link" href="${p.video}" target="_blank">▶ Ver receta en YouTube</a>` : '';
    const elab = p.elaboracion ? `<div class="elab"><div class="elab-label">Elaboración</div>${p.elaboracion}</div>` : '';
    return `<div class="plato"><div class="plato-name">${p.nombre}</div><div class="ingred-list">${p.ingredientes}</div>${elab}${videoBtn}</div>`;
  }).join('<hr style="border:none;border-top:0.5px solid var(--border);margin:10px 0;">');
  return `<div class="meal-block">
    <div class="meal-header" onclick="toggleMeal('${id}')">
      <div><div class="meal-label">${MEAL_LABELS[mealKey]}</div><div class="meal-time">${MEAL_TIMES[mealKey]} · ${items.length} plato${items.length>1?'s':''}</div></div>
      <div class="chevron" id="ch_${id}">▾</div>
    </div>
    <div class="meal-body" id="mb_${id}">${platosHtml}</div>
  </div>`;
}

function toggleMeal(id) {
  document.getElementById('mb_'+id).classList.toggle('open');
  document.getElementById('ch_'+id).classList.toggle('open');
}

function buildDayHTML(day, prefix) {
  const mealBlocks = Object.entries(MEALS[day]).map(([k,items]) => buildMealBlock(k,items,prefix)).join('');
  const tags = getDailyIngredients(day).map(i => `<span class="ingred-tag">${i}</span>`).join('');
  return `<div class="day-detail"><div class="day-title">${day}</div>${mealBlocks}<div class="ingred-day-section"><div class="ingred-day-title">Ingredientes necesarios hoy</div><div>${tags}</div></div></div>`;
}

function buildWeekGrid() {
  document.getElementById('weekGrid').innerHTML = DAYS.map(day => {
    const almuerzo = MEALS[day].almuerzo[0].nombre;
    const cena = MEALS[day].cena[0].nombre;
    return `<div class="day-card" id="wdc_${day}" onclick="selectWeekDay('${day}')">
      <div class="day-name">${day.substring(0,3).toUpperCase()}</div>
      <div class="meal-mini"><span class="mini-label">Almuerzo</span><span>${almuerzo}</span><span class="mini-label">Cena</span><span>${cena}</span></div>
    </div>`;
  }).join('');
}

function selectWeekDay(day) {
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('wdc_'+day).classList.add('selected');
  document.getElementById('weekDayDetail').innerHTML = buildDayHTML(day,'w');
}

function buildDayButtons() {
  document.getElementById('dayButtons').innerHTML = DAYS.map(day =>
    `<div class="day-btn" id="dbt_${day}" onclick="selectDay('${day}')">${day}</div>`).join('');
}

function selectDay(day) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('dbt_'+day).classList.add('active');
  document.getElementById('dayDetail').innerHTML = buildDayHTML(day,'d');
}

function rebuildCompraUI() {
  document.getElementById('compraGrid').innerHTML = Object.entries(COMPRA).map(([cat,items]) =>
    `<div class="compra-cat"><div class="cat-title">${cat}</div>` +
    items.map(item => {
      const key = item.replace(/[\s()\/]/g,'_');
      const done = checkedItems.has(item);
      return `<div class="compra-item${done?' done':''}" id="ci_${key}" onclick="toggleItem('${item}','${key}')"><div class="check${done?' checked':''}" id="ck_${key}">${done?'✓':''}</div><span>${item}</span></div>`;
    }).join('') + '</div>').join('');
  updateProgress();
}

function toggleItem(item, key) {
  const ci = document.getElementById('ci_'+key);
  const ck = document.getElementById('ck_'+key);
  if (checkedItems.has(item)) { checkedItems.delete(item); ci.classList.remove('done'); ck.classList.remove('checked'); ck.textContent=''; }
  else { checkedItems.add(item); ci.classList.add('done'); ck.classList.add('checked'); ck.textContent='✓'; }
  saveChecked(); updateProgress();
}

function resetCompra() {
  checkedItems.clear(); saveChecked();
  document.querySelectorAll('.compra-item').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.check').forEach(el => { el.classList.remove('checked'); el.textContent=''; });
  updateProgress();
}

function printCompra() {
  const now = new Date().toLocaleDateString('es-ES',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  let rows = '';
  Object.entries(COMPRA).forEach(([cat,items]) => {
    rows += '<div class="cat"><div class="cat-title">'+cat+'</div>';
    items.forEach(item => {
      const done = checkedItems.has(item);
      rows += '<div class="item'+(done?' done':'')+'"><div class="box'+(done?' checked':'')+'">'+( done?'&#10003;':'')+'</div><span>'+item+'</span></div>';
    });
    rows += '</div>';
  });
  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Lista de la compra — Mes 4</title>
<style>body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:2rem;font-size:13px;}h1{font-size:20px;font-weight:600;margin-bottom:4px;}.sub{font-size:12px;color:#666;margin-bottom:1.5rem;border-bottom:1px solid #ccc;padding-bottom:.75rem;}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}.cat{break-inside:avoid;margin-bottom:8px;}.cat-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;border-bottom:.5px solid #ccc;padding-bottom:3px;margin-bottom:5px;}.item{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:.5px solid #eee;}.item:last-child{border-bottom:none;}.item.done{text-decoration:line-through;color:#aaa;}.box{width:12px;height:12px;border:1px solid #999;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}.box.checked{background:#DC2626;border-color:#DC2626;color:white;}.footer{margin-top:1.5rem;text-align:center;font-size:10px;color:#999;border-top:.5px solid #eee;padding-top:.5rem;}</style></head><body>
<h1>Lista de la compra — Mes 4</h1><div class="sub">Hilario Cambero &mdash; Nutricionista: Mar&#237;a Rosco Rodr&#237;guez</div>
<div class="grid">${rows}</div><div class="footer">Impreso el ${now}</div></body></html>`;
  const blob = new Blob([html],{type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.target='_blank'; a.rel='noopener';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}

compraRef.on('value', (snapshot) => {
  const data = snapshot.val();
  checkedItems.clear();
  if (data) {
    getAllItems().forEach(item => {
      const key = item.replace(/[.#$\/\[\]]/g, '_');
      if (data[key] === true) checkedItems.add(item);
    });
  }
  rebuildCompraUI();
  updateProgress();
}, (error) => {
  console.error('Firebase error:', error);
  rebuildCompraUI();
  updateProgress();
});

window.showView = showView;
window.selectWeekDay = selectWeekDay;
window.selectDay = selectDay;
window.toggleMeal = toggleMeal;
window.toggleItem = toggleItem;
window.resetCompra = resetCompra;
window.printCompra = printCompra;
window.rebuildCompraUI = rebuildCompraUI;

buildWeekGrid(); buildDayButtons(); selectDay('Lunes');
rebuildCompraUI();

}); // end window.onload
</script>
</body>
</html>
