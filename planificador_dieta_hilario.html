<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planificador de Dieta — Hilario Cambero</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --surface2: #f2f0eb;
  --border: rgba(0,0,0,0.1);
  --border2: rgba(0,0,0,0.2);
  --text: #1a1a1a;
  --text2: #5a5a5a;
  --text3: #999;
  --green: #1D9E75;
  --green-light: #E1F5EE;
  --green-mid: #9FE1CB;
  --green-dark: #0F6E56;
  --blue: #185FA5;
  --blue-light: #E6F1FB;
  --blue-mid: #B5D4F4;
  --radius: 10px;
  --radius-lg: 14px;
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}
header {
  background: var(--surface);
  border-bottom: 0.5px solid var(--border);
  padding: 1.25rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 17px; font-weight: 600; color: var(--text); }
.header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
.badge-nutri { font-size: 11px; background: var(--green-light); color: var(--green-dark); border-radius: 20px; padding: 4px 12px; }

.container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

.tabs { display: flex; gap: 6px; margin-bottom: 1.75rem; flex-wrap: wrap; }
.tab {
  padding: 9px 18px;
  border: 0.5px solid var(--border2);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 14px;
  background: var(--surface);
  color: var(--text2);
  transition: all 0.15s;
  font-weight: 400;
}
.tab.active {
  background: var(--green);
  color: white;
  border-color: var(--green);
  font-weight: 500;
}
.tab:hover:not(.active) { background: var(--surface2); }

.view { display: none; }
.view.active { display: block; }

/* WEEK GRID */
.day-grid { display: grid; grid-template-columns: repeat(7, minmax(0,1fr)); gap: 8px; margin-bottom: 1rem; }
.day-card {
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 8px;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
}
.day-card:hover { border-color: var(--green); }
.day-card.selected { border-color: var(--green); background: var(--green-light); }
.day-name { font-size: 11px; font-weight: 600; margin-bottom: 6px; color: var(--text2); letter-spacing: 0.05em; }
.day-card.selected .day-name { color: var(--green-dark); }
.meal-mini { font-size: 10px; color: var(--text3); line-height: 1.4; }
.meal-mini span { display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-mini .mini-label { font-size: 9px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }

/* DAY DETAIL */
.day-detail {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-top: 1rem;
}
.day-title { font-size: 20px; font-weight: 600; margin-bottom: 1.25rem; color: var(--green-dark); }

.meal-block { margin-bottom: 10px; border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.meal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; cursor: pointer;
  background: var(--surface2);
  user-select: none;
  transition: background 0.1s;
}
.meal-header:hover { background: #eae8e2; }
.meal-label { font-size: 13px; font-weight: 600; }
.meal-time { font-size: 11px; color: var(--text3); margin-top: 1px; }
.meal-body { display: none; padding: 14px; border-top: 0.5px solid var(--border); }
.meal-body.open { display: block; }
.plato { margin-bottom: 14px; }
.plato:last-child { margin-bottom: 0; }
.plato-name { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
.ingred-list { font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 6px; }
.ingred-list::before { content: "🧂 "; }
.elab {
  font-size: 12px; color: var(--text2); border-left: 2px solid var(--green-mid);
  padding-left: 10px; line-height: 1.7; margin-bottom: 8px; font-style: italic;
}
.elab-label { font-size: 10px; font-weight: 600; color: var(--green); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 0.05em; font-style: normal; }
.video-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--blue); text-decoration: none;
  border: 0.5px solid var(--blue-mid); border-radius: 20px;
  padding: 4px 10px; background: var(--blue-light);
  transition: background 0.15s;
}
.video-link:hover { background: var(--blue-mid); }
.chevron { font-size: 14px; color: var(--text3); transition: transform 0.2s; line-height: 1; }
.chevron.open { transform: rotate(180deg); }

/* DAILY INGREDIENTS */
.ingred-day-section {
  background: var(--green-light);
  border: 0.5px solid var(--green-mid);
  border-radius: var(--radius);
  padding: 14px;
  margin-top: 14px;
}
.ingred-day-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--green-dark); }
.ingred-tag {
  display: inline-block; font-size: 11px;
  background: white; color: var(--green-dark);
  border: 0.5px solid var(--green-mid);
  border-radius: 20px; padding: 3px 10px; margin: 3px;
}

/* DAY BUTTONS */
.day-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.day-btn {
  padding: 8px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius);
  cursor: pointer; font-size: 13px; background: var(--surface); color: var(--text2); transition: all 0.15s;
}
.day-btn.active { background: var(--green); color: white; border-color: var(--green); font-weight: 500; }
.day-btn:hover:not(.active) { background: var(--surface2); }

/* COMPRA */
.compra-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.compra-cat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
.cat-title { font-size: 11px; font-weight: 700; margin-bottom: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.compra-item { display: flex; align-items: center; gap: 9px; font-size: 13px; padding: 5px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; transition: color 0.1s; }
.compra-item:last-child { border-bottom: none; }
.compra-item.done { text-decoration: line-through; color: var(--text3); }
.check {
  width: 16px; height: 16px; border: 0.5px solid var(--border2); border-radius: 4px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 10px; transition: all 0.15s;
}
.check.checked { background: var(--green); border-color: var(--green); color: white; }
.progress-bar-wrap { background: var(--surface2); border-radius: 20px; height: 6px; margin-bottom: 1.5rem; overflow: hidden; }
.progress-bar { background: var(--green); height: 6px; border-radius: 20px; transition: width 0.3s; }
.progress-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; }

@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { position: absolute; top: 0; left: 0; width: 100%; font-family: 'Segoe UI', system-ui, sans-serif; color: #1a1a1a; }
  .print-header { text-align: center; margin-bottom: 1.5rem; border-bottom: 1px solid #ccc; padding-bottom: 0.75rem; }
  .print-header h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .print-header p { font-size: 12px; color: #666; }
  .print-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .print-cat { break-inside: avoid; margin-bottom: 12px; }
  .print-cat-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin-bottom: 6px; border-bottom: 0.5px solid #ccc; padding-bottom: 3px; }
  .print-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 3px 0; border-bottom: 0.5px solid #eee; }
  .print-item:last-child { border-bottom: none; }
  .print-item.done { text-decoration: line-through; color: #aaa; }
  .print-box { width: 12px; height: 12px; border: 1px solid #999; border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
  .print-box.checked { background: #1D9E75; border-color: #1D9E75; color: white; }
  .print-footer { margin-top: 1.5rem; text-align: center; font-size: 10px; color: #999; border-top: 0.5px solid #eee; padding-top: 0.5rem; }
}
</style>
</head>

const fbApp = firebase.initializeApp(firebaseConfig);
const db = fbApp.database();
const compraRef = db.ref('compra/items');

const checkedItems = new Set();

function saveChecked(itemSet) {
  const obj = {};
  getAllItems().forEach(item => { obj[item.replace(/[.#$/\[\]]/g, '_')] = itemSet.has(item); });
  compraRef.set(obj).catch(e => console.error('Firebase write error:', e));
}

// Listen for changes from any device in real time
compraRef.on('value', (snapshot) => {
  const data = snapshot.val();
  checkedItems.clear();
  if (data) {
    getAllItems().forEach(item => {
      const key = item.replace(/[.#$/\[\]]/g, '_');
      if (data[key] === true) checkedItems.add(item);
    });
  }
  rebuildCompraUI();
  updateProgress();
});

function getAllItems() {
  return Object.values(COMPRA).flat();
}

function updateProgress() {
  const all = getAllItems();
  const done = checkedItems.size;
  const pct = all.length ? Math.round((done / all.length) * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' de ' + all.length + ' artículos marcados';
}

function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  const labels = { semanal: 'semanal', diaria: 'diaria', compra: 'compra' };
  document.querySelectorAll('.tab').forEach(el => {
    if (el.textContent.toLowerCase().includes(labels[v])) el.classList.add('active');
  });
}

function getDailyIngredients(day) {
  const all = [];
  Object.values(MEALS[day]).forEach(items => {
    items.forEach(item => {
      item.ingredientes.split(',').forEach(s => all.push(s.trim()));
    });
  });
  return [...new Set(all)];
}

function buildMealBlock(mealKey, items, idPrefix) {
  const id = idPrefix + '_' + mealKey;
  const platosHtml = items.map(p => {
    const videoBtn = p.video ? `<a class="video-link" href="${p.video}" target="_blank">▶ Ver receta en YouTube</a>` : '';
    const elab = p.elaboracion ? `<div class="elab"><div class="elab-label">Elaboración</div>${p.elaboracion}</div>` : '';
    return `<div class="plato">
      <div class="plato-name">${p.nombre}</div>
      <div class="ingred-list">${p.ingredientes}</div>
      ${elab}
      ${videoBtn}
    </div>`;
  }).join('<hr style="border:none;border-top:0.5px solid var(--border);margin:10px 0;">');
  return `<div class="meal-block">
    <div class="meal-header" onclick="toggleMeal('${id}')">
      <div>
        <div class="meal-label">${MEAL_LABELS[mealKey]}</div>
        <div class="meal-time">${MEAL_TIMES[mealKey]} · ${items.length} plato${items.length > 1 ? 's' : ''}</div>
      </div>
      <div class="chevron" id="ch_${id}">▾</div>
    </div>
    <div class="meal-body" id="mb_${id}">${platosHtml}</div>
  </div>`;
}

function toggleMeal(id) {
  const mb = document.getElementById('mb_' + id);
  const ch = document.getElementById('ch_' + id);
  mb.classList.toggle('open');
  ch.classList.toggle('open');
}

function buildDayHTML(day, prefix) {
  const mealBlocks = Object.entries(MEALS[day]).map(([k, items]) => buildMealBlock(k, items, prefix)).join('');
  const ingreds = getDailyIngredients(day);
  const tags = ingreds.map(i => `<span class="ingred-tag">${i}</span>`).join('');
  return `<div class="day-detail">
    <div class="day-title">${day}</div>
    ${mealBlocks}
    <div class="ingred-day-section">
      <div class="ingred-day-title">Ingredientes necesarios hoy</div>
      <div>${tags}</div>
    </div>
  </div>`;
}

function buildWeekGrid() {
  const grid = document.getElementById('weekGrid');
  grid.innerHTML = DAYS.map(day => {
    const almuerzo = MEALS[day].almuerzo[0].nombre;
    const cena = MEALS[day].cena[0].nombre;
    return `<div class="day-card" id="wdc_${day}" onclick="selectWeekDay('${day}')">
      <div class="day-name">${day.substring(0,3).toUpperCase()}</div>
      <div class="meal-mini">
        <span class="mini-label">Almuerzo</span>
        <span>${almuerzo}</span>
        <span class="mini-label">Cena</span>
        <span>${cena}</span>
      </div>
    </div>`;
  }).join('');
}

function selectWeekDay(day) {
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('wdc_' + day).classList.add('selected');
  document.getElementById('weekDayDetail').innerHTML = buildDayHTML(day, 'w');
}

function buildDayButtons() {
  document.getElementById('dayButtons').innerHTML = DAYS.map(day =>
    `<div class="day-btn" id="dbt_${day}" onclick="selectDay('${day}')">${day}</div>`
  ).join('');
}

function selectDay(day) {
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('dbt_' + day).classList.add('active');
  document.getElementById('dayDetail').innerHTML = buildDayHTML(day, 'd');
}

function rebuildCompraUI() {
  document.getElementById('compraGrid').innerHTML = Object.entries(COMPRA).map(([cat, items]) =>
    `<div class="compra-cat"><div class="cat-title">${cat}</div>` +
    items.map(item => {
      const key = item.replace(/[\s()\/]/g, '_');
      const isDone = checkedItems.has(item);
      return `<div class="compra-item${isDone ? ' done' : ''}" id="ci_${key}" onclick="toggleItem('${item}','${key}')">
        <div class="check${isDone ? ' checked' : ''}" id="ck_${key}">${isDone ? '✓' : ''}</div>
        <span>${item}</span>
      </div>`;
    }).join('') + '</div>'
  ).join('');
  updateProgress();
}

function toggleItem(item, key) {
  const ci = document.getElementById('ci_' + key);
  const ck = document.getElementById('ck_' + key);
  if (checkedItems.has(item)) {
    checkedItems.delete(item);
    ci.classList.remove('done');
    ck.classList.remove('checked');
    ck.textContent = '';
  } else {
    checkedItems.add(item);
    ci.classList.add('done');
    ck.classList.add('checked');
    ck.textContent = '✓';
  }
  saveChecked(checkedItems);
  updateProgress();
}

function resetCompra() {
  checkedItems.clear();
  saveChecked(checkedItems);
  document.querySelectorAll('.compra-item').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.check').forEach(el => { el.classList.remove('checked'); el.textContent = ''; });
  updateProgress();
}


function printCompra() {
  const now = new Date().toLocaleDateString('es-ES', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  let rows = '';
  Object.entries(COMPRA).forEach(([cat, items]) => {
    rows += '<div class="cat"><div class="cat-title">' + cat + '</div>';
    items.forEach(item => {
      const done = checkedItems.has(item);
      rows += '<div class="item' + (done ? ' done' : '') + '">'
            + '<div class="box' + (done ? ' checked' : '') + '">' + (done ? '&#10003;' : '') + '</div>'
            + '<span>' + item + '</span></div>';
    });
    rows += '</div>';
  });
  const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<title>Lista de la compra</title>
<style>
  body{font-family:'Segoe UI',sans-serif;color:#1a1a1a;padding:2rem;font-size:13px;}
  h1{font-size:20px;font-weight:600;margin-bottom:4px;}
  .sub{font-size:12px;color:#666;margin-bottom:1.5rem;border-bottom:1px solid #ccc;padding-bottom:.75rem;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .cat{break-inside:avoid;margin-bottom:8px;}
  .cat-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#666;border-bottom:.5px solid #ccc;padding-bottom:3px;margin-bottom:5px;}
  .item{display:flex;align-items:center;gap:7px;padding:3px 0;border-bottom:.5px solid #eee;}
  .item:last-child{border-bottom:none;}
  .item.done{text-decoration:line-through;color:#aaa;}
  .box{width:12px;height:12px;border:1px solid #999;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;}
  .box.checked{background:#1D9E75;border-color:#1D9E75;color:white;}
  .footer{margin-top:1.5rem;text-align:center;font-size:10px;color:#999;border-top:.5px solid #eee;padding-top:.5rem;}
</style></head><body>
<h1>Lista de la compra</h1>
<div class="sub">Hilario Cambero &mdash; Semana 1 &mdash; Nutricionista: Mar&#237;a Rosco Rodr&#237;guez</div>
<div class="grid">${rows}</div>
<div class="footer">Impreso el ${now}</div>
</body></html>`;
  const blob = new Blob([html], {type: 'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}
